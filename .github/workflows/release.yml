name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          case "$tag" in
            v*) ;;
            *)
              echo "Release workflow only supports root v* tags, got: $tag" >&2
              exit 1
              ;;
          esac

          git fetch --force --tags
          git rev-parse "$tag" >/dev/null
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: scripts/release-notes.sh "${{ steps.tag.outputs.tag }}" > release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "runa $TAG" \
              --notes-file release-notes.md \
              --draft=false \
              --prerelease=false
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "runa $TAG" \
              --notes-file release-notes.md
          fi
